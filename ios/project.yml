name: SeaToSkyCounter

options:
  bundleIdPrefix: ca.fieldtrip
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: false
  indentWidth: 4
  tabWidth: 4

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    SDKROOT: iphoneos
    TARGETED_DEVICE_FAMILY: "1"            # iPhone only

targets:
  SeaToSkyCounter:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: SeaToSkyCounter
        excludes:
          - "Info.plist"                   # generated by xcodegen info section below
      - path: yolov8n.mlpackage            # Core ML model — compiled at build time

    info:
      path: SeaToSkyCounter/Info.plist
      properties:
        CFBundleDisplayName: Sea to Sky Counter
        NSCameraUsageDescription: "Sea to Sky Counter uses the camera to detect and count vehicles on Highway 99."
        NSPhotoLibraryAddUsageDescription: "Sea to Sky Counter saves cropped vehicle images to Photos to build training data for the custom detection model."
        UIRequiresFullScreen: true
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ca.fieldtrip.seatoskycounter
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""               # Xcode fills this in on first build
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: "YES"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          DEBUG_INFORMATION_FORMAT: dwarf
          ONLY_ACTIVE_ARCH: "YES"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: wholemodule
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          VALIDATE_PRODUCT: "YES"
